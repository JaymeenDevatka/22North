services:
  db:
    image: mysql:8.4
    container_name: cloud-cost-intelligence-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: cloud_cost_intelligence
      MYSQL_USER: cloudapp
      MYSQL_PASSWORD: cloudapp123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro

volumes:
  mysql_data:
